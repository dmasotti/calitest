[pytest]
# Pytest configuration for plugin tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = 
    unit
    integration
    e2e

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Markers
markers =
    unit: Unit tests (pure functions)
    integration: Integration tests (with mocks)
    e2e: End-to-end tests (full flows)
    slow: Slow running tests
    qt: Tests requiring Qt
    calibre: Tests requiring Calibre (mocked)

# Coverage options (if pytest-cov installed)
# [tool:pytest]
# coverage_source = sync_calimob
# coverage_report = html,term
